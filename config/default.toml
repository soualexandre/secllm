[server]
host = "0.0.0.0"
port = 3010

[redis]
url = "redis://127.0.0.1:6379"

[rabbitmq]
# Use secllm:secllm quando a infra estiver no Docker (definitions.json); guest:guest para RabbitMQ local padrão
url = "amqp://secllm:secllm@127.0.0.1:5672/%2f"
audit_exchange = "secllm.audit"
audit_queue = "secllm.audit.logs"
audit_routing_key = "audit.log"

[clickhouse]
url = "http://127.0.0.1:8123"
database = "secllm"
audit_table = "audit_events"

[postgres]
# Porta 5433 para não conflitar com Postgres local (5432). Infra Docker expõe 5433.
url = "postgres://secllm:secllm@127.0.0.1:5433/secllm"

[jwt]
secret = "change-me-in-production"
# issuer = "secllm"
# audience = "secllm-clients"

[llm]
openai_base_url = "https://api.openai.com"
anthropic_base_url = "https://api.anthropic.com"
gemini_base_url = "https://generativelanguage.googleapis.com"

[logging_worker]
batch_max_size = 100
batch_max_latency_ms = 500
