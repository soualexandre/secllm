[server]
host = "0.0.0.0"
port = 3000

[redis]
url = "redis://127.0.0.1:6379"

[rabbitmq]
url = "amqp://guest:guest@127.0.0.1:5672/%2f"
audit_exchange = "secllm.audit"
audit_queue = "secllm.audit.logs"
audit_routing_key = "audit.log"

[clickhouse]
url = "http://127.0.0.1:8123"
database = "secllm"
audit_table = "audit_events"

[postgres]
url = "postgres://127.0.0.1:5432/secllm"

[jwt]
secret = "change-me-in-production"
# issuer = "secllm"
# audience = "secllm-clients"

[llm]
openai_base_url = "https://api.openai.com"
anthropic_base_url = "https://api.anthropic.com"

[logging_worker]
batch_max_size = 100
batch_max_latency_ms = 500
