# SecLLM – desenvolvimento com auto-reload (cargo watch)
# Uso: docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build
# Se o link falhar com "ld terminated with signal 9 [Killed]", é OOM: dê mais RAM ao Docker/Colima (ex.: colima start --memory 6).

services:
  secllm:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: secllm:dev
    container_name: secllm-app
    volumes:
      - .:/app
      - secllm_target:/app/target
    environment:
      # Reduz uso de RAM na compilação/link (evita OOM no container)
      CARGO_BUILD_JOBS: "1"
      RUSTFLAGS: "-C codegen-units=1"
      SECLLM__SERVER__HOST: "0.0.0.0"
      SECLLM__SERVER__PORT: "3000"
      SECLLM__REDIS__URL: "redis://redis:6379"
      SECLLM__RABBITMQ__URL: "amqp://secllm:secllm@rabbitmq:5672/%2f"
      SECLLM__RABBITMQ__AUDIT_EXCHANGE: "secllm.audit"
      SECLLM__RABBITMQ__AUDIT_QUEUE: "secllm.audit.logs"
      SECLLM__RABBITMQ__AUDIT_ROUTING_KEY: "audit.log"
      SECLLM__CLICKHOUSE__URL: "http://clickhouse:8123"
      SECLLM__CLICKHOUSE__DATABASE: "secllm"
      SECLLM__CLICKHOUSE__AUDIT_TABLE: "audit_events"
      SECLLM__JWT__SECRET: "change-me-in-production"
      SECLLM__LOGGING_WORKER__BATCH_MAX_SIZE: "100"
      SECLLM__LOGGING_WORKER__BATCH_MAX_LATENCY_MS: "500"
      SECLLM__POSTGRES__URL: "postgres://secllm:secllm@postgres:5432/secllm"
    # Não usar restart: unless-stopped em dev para ver logs e parar com Ctrl+C
    restart: "no"

volumes:
  secllm_target:
